<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love is the Universe</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Playfair Display', serif; 
            color: white;
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: absolute; width: 100%; height: 100%; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none;
        }

        #lyrics-container {
            width: 90%; text-align: center; height: 300px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* The Waltzing Lyrics */
        .lyric-line {
            display: flex; justify-content: center; flex-wrap: wrap; position: absolute;
        }

        .char {
            display: inline-block;
            font-size: clamp(2rem, 8vw, 4rem); 
            font-weight: 600; font-style: italic;
            color: #fff0f5; /* Lavender Blush */
            opacity: 0;
            transition: opacity 1s, filter 1s;
            filter: blur(5px);
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.8);
            margin: 0 2px;
            /* Every letter starts its own permanent dance */
            animation: letter-waltz 3s infinite ease-in-out;
        }

        .char.active {
            opacity: 1; filter: blur(0px);
        }

        /* The Dance: A gentle bob and sway */
        @keyframes letter-waltz {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-2deg); }
            75% { transform: translateY(10px) rotate(2deg); }
        }

        .crystal-glow .char { 
            font-family: 'Dancing Script', cursive; 
            color: #00f2ff; font-style: normal;
            text-shadow: 0 0 20px #00f2ff, 0 0 40px rgba(0, 242, 255, 0.5);
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center;
            align-items: center; z-index: 100;
        }

        #start-btn {
            padding: 20px 60px; background: none; 
            border: 1px solid rgba(255,182,193,0.5);
            color: #ffb6c1; font-family: 'Playfair Display', serif;
            font-size: 1.4rem; font-style: italic;
            letter-spacing: 5px; cursor: pointer;
            transition: 0.8s; pointer-events: all;
            border-radius: 50px;
        }
        #start-btn:hover { background: #fff; color: #d02090; box-shadow: 0 0 50px rgba(255, 182, 193, 0.8); }
    </style>
</head>
<body>

<div id="start-screen">
    <button id="start-btn">IGNITE THE GALAXY</button>
</div>

<div id="ui-layer">
    <div id="lyrics-container"></div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('start-btn');
const startScreen = document.getElementById('start-screen');
const lyricsContainer = document.getElementById('lyrics-container');

let audio, audioCtx, analyser, dataArray;
let stars = [], heart3D = [];
let isPlaying = false, is3D = false;
let heart3DProgress = 0, rotationAngle = 0;

// YOUR PRECISE TIMING
const syncData = [
    { t: 2.0,  txt: "Girl," },
    { t: 2.4,  txt: "just let me be your man," },
    { t: 4.7,  txt: "I wanna hold your hand," },
    { t: 6.7,  txt: "and take you to your fantasy" },
    { t: 13.4, txt: "Eyes," },
    { t: 14.3, txt: "when I look into your eyes," },
    { t: 16.2, txt: "you make me realize," },
    { t: 17.9, txt: "that baby you're the only one for me" },
    { t: 21.8, txt: "Girl," },
    { t: 22.8, txt: "you're like a crystal moon,", isCrystal: true },
    { t: 24.9, txt: "such a refreshing tune," },
    { t: 26.8, txt: "you got me singing every verse" },
    { t: 30.0, txt: "Come into my galaxy," },
    { t: 32.4, txt: "come fly away with me," },
    { t: 34.3, txt: "" } 
];

function createStarfield() {
    for(let i=0; i<500; i++) {
        stars.push({ x: Math.random()*innerWidth, y: Math.random()*innerHeight, s: Math.random()*1.5, o: Math.random() });
    }
}

function init3DHeart() {
    is3D = true;
    stars = []; 
    for (let i = 0; i < 2500; i++) {
        const t = Math.random() * Math.PI * 2;
        const p = Math.random() * Math.PI;
        const r = 18;
        const x = r * 16 * Math.pow(Math.sin(t), 3) * Math.sin(p);
        const y = -r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * Math.sin(p);
        const z = r * 10 * Math.cos(p); 
        heart3D.push({ x, y, z, size: Math.random() * 2 + 0.5 });
    }
}

function createDancingLyrics(text, isCrystal) {
    const wrapper = document.createElement('div');
    wrapper.className = 'lyric-line' + (isCrystal ? ' crystal-glow' : '');
    text.split("").forEach((char, i) => {
        const span = document.createElement('span');
        span.className = 'char';
        span.innerHTML = char === " " ? "&nbsp;" : char;
        // Staggered dance starting times
        span.style.animationDelay = `${i * 100}ms`;
        wrapper.appendChild(span);
        setTimeout(() => span.classList.add('active'), 50);
    });
    return wrapper;
}

startBtn.addEventListener('click', () => {
    startScreen.style.opacity = '0';
    setTimeout(() => startScreen.remove(), 1000);
    audio = new Audio('galaxy.mp3');
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 128;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    audio.play();
    isPlaying = true;
    createStarfield();
    render();
});

function project3D(x, y, z, angle) {
    const rad = angle * Math.PI / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);
    const rotatedX = x * cos - z * sin;
    const rotatedZ = x * sin + z * cos;
    const fov = 500;
    const scale = fov / (fov + rotatedZ);
    return {
        x: rotatedX * scale + innerWidth / 2,
        y: y * scale + innerHeight / 2,
        scale: scale,
        alpha: Math.max(0.2, scale)
    };
}

function render() {
    requestAnimationFrame(render);
    canvas.width = innerWidth; canvas.height = innerHeight;
    let avg = 0;
    if (isPlaying && !is3D) {
        analyser.getByteFrequencyData(dataArray);
        avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
    }

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!is3D) {
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255, 255, 255, ${s.o + (avg/255)})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill();
        });

        const time = audio.currentTime;
        const current = syncData.find((d, i) => time >= d.t && (!syncData[i+1] || time < syncData[i+1].t));

        if (current) {
            let activeLine = document.querySelector('.lyric-line');
            if (!activeLine || activeLine.getAttribute('data-text') !== current.txt) {
                if (activeLine) activeLine.remove();
                if (current.txt !== "") {
                    const newLine = createDancingLyrics(current.txt, current.isCrystal);
                    newLine.setAttribute('data-text', current.txt);
                    lyricsContainer.appendChild(newLine);
                }
            }
        }
        if (time > 38) init3DHeart(); 
    } else {
        if (heart3DProgress < 1) heart3DProgress += 0.0025;
        rotationAngle += 0.6;
        const limit = Math.floor(heart3D.length * heart3DProgress);
        for (let i = 0; i < limit; i++) {
            const p = heart3D[i];
            const proj = project3D(p.x, p.y, p.z, rotationAngle);
            ctx.fillStyle = `rgba(255, 182, 193, ${proj.alpha})`;
            ctx.shadowBlur = 5 * proj.scale; ctx.shadowColor = "#ffb6c1";
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, p.size * proj.scale, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}
</script>
</body>
</html>
