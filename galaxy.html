<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love is the Universe</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #020205; 
            font-family: 'Playfair Display', serif; 
            color: white; cursor: crosshair; 
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: absolute; width: 100%; height: 100%; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none;
        }

        #lyrics-container {
            width: 90%; text-align: center; height: 250px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .lyric-text {
            font-size: clamp(2.2rem, 7vw, 4.5rem); 
            font-weight: 600; 
            font-style: italic; 
            text-align: center; 
            position: absolute; 
            opacity: 0;
            color: #fff0f5; /* Lavender Blush */
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
            filter: blur(15px); 
            transform: scale(0.8) translateY(20px);
            text-shadow: 0 0 15px rgba(255, 182, 193, 0.8), 
                         0 0 30px rgba(255, 105, 180, 0.4);
            animation: shimmer 3s infinite alternate;
        }

        .lyric-text.active { 
            opacity: 1; 
            filter: blur(0px); 
            transform: scale(1) translateY(0); 
        }
        
        /* The "Crystal Moon" & "Universe" Effect */
        .crystal-glow { 
            font-family: 'Dancing Script', cursive; 
            color: #00f2ff; 
            font-style: normal;
            text-shadow: 0 0 20px #00f2ff, 
                         0 0 40px #70e1ff,
                         0 0 80px rgba(0, 242, 255, 0.5);
        }

        @keyframes shimmer {
            0% { text-shadow: 0 0 10px rgba(255, 182, 193, 0.8); }
            100% { text-shadow: 0 0 25px rgba(255, 105, 180, 1), 0 0 40px rgba(255, 255, 255, 0.6); }
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center;
            align-items: center; z-index: 100;
        }

        #start-btn {
            padding: 20px 60px; background: none; 
            border: 1px solid rgba(255,182,193,0.5);
            color: #ffb6c1; 
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem; font-style: italic;
            letter-spacing: 5px; cursor: pointer;
            transition: 0.8s; pointer-events: all;
            border-radius: 50px;
        }
        
        #start-btn:hover { 
            background: #fff; color: #d02090; 
            box-shadow: 0 0 50px rgba(255, 182, 193, 0.8); 
            border-color: white;
        }
    </style>
</head>
<body>

<div id="start-screen">
    <button id="start-btn">IGNITE THE GALAXY</button>
</div>

<div id="ui-layer">
    <div id="lyrics-container"></div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('start-btn');
const startScreen = document.getElementById('start-screen');
const lyricsContainer = document.getElementById('lyrics-container');

let audio, audioCtx, analyser, dataArray;
let particles = [];
let stars = [];
let isPlaying = false;

// YOUR MANUALLY UPDATED TIMING MAP
const syncData = [
    { t: 2.0,  txt: "Girl," },
    { t: 2.4,  txt: "just let me be your man," },
    { t: 4.7,  txt: "I wanna hold your hand," },
    { t: 6.7,  txt: "and take you to your fantasy" },
    { t: 13.4, txt: "Eyes," },
    { t: 14.3, txt: "when I look into your eyes," },
    { t: 16.2, txt: "you make me realize," },
    { t: 17.9, txt: "that baby you're the only one for me" },
    { t: 21.8, txt: "Girl," },
    { t: 22.8, txt: "<span class='crystal-glow'>you're like a crystal moon,</span>" },
    { t: 24.9, txt: "such a refreshing tune," },
    { t: 26.8, txt: "you got me singing every verse" },
    { t: 30.0, txt: "Come into my galaxy," },
    { t: 32.4, txt: "come fly away with me," },
    { t: 34.3, txt: "our love is like the <span class='crystal-glow'>universe</span>" }
];

class Particle {
    constructor(x, y, color, speed) {
        this.x = x; this.y = y;
        this.size = Math.random() * 4 + 1;
        this.vx = (Math.random() - 0.5) * speed;
        this.vy = (Math.random() - 0.5) * speed;
        this.life = 1.0;
        this.color = color;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= 0.015; }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    }
}

function createStarfield() {
    for(let i=0; i<600; i++) {
        stars.push({ x: Math.random()*innerWidth, y: Math.random()*innerHeight, s: Math.random()*1.8, o: Math.random() });
    }
}

startBtn.addEventListener('click', () => {
    startScreen.style.opacity = '0';
    setTimeout(() => startScreen.remove(), 1000);
    
    audio = new Audio('galaxy.mp3');
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 128;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    audio.play();
    isPlaying = true;
    createStarfield();
    render();
});

window.addEventListener('mousemove', (e) => {
    if(!isPlaying) return;
    const hue = (Date.now() / 15) % 360;
    for(let i=0; i<4; i++) {
        particles.push(new Particle(e.clientX, e.clientY, `hsl(${hue}, 80%, 70%)`, 3));
    }
});

function render() {
    requestAnimationFrame(render);
    canvas.width = innerWidth; canvas.height = innerHeight;
    analyser.getByteFrequencyData(dataArray);
    
    let avg = dataArray.reduce((a, b) => a + b) / dataArray.length;

    // Reactive Background
    ctx.fillStyle = `rgba(2, 2, 8, ${0.4 - (avg/600)})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dancing Stars
    stars.forEach(s => {
        ctx.fillStyle = `rgba(255, 255, 255, ${s.o + (avg/255)})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill();
    });

    // Lyric Sync
    const time = audio.currentTime;
    const current = syncData.find((d, i) => time >= d.t && (!syncData[i+1] || time < syncData[i+1].t));

    if (current) {
        let active = document.getElementById('active-lyric');
        if (!active || active.innerHTML !== current.txt) {
            if (active) active.remove();
            const div = document.createElement('div');
            div.id = 'active-lyric';
            div.className = 'lyric-text';
            div.innerHTML = current.txt;
            lyricsContainer.appendChild(div);
            setTimeout(() => div.classList.add('active'), 50);

            // Blast stardust on new lines
            for(let i=0; i<30; i++) {
                particles.push(new Particle(innerWidth/2, innerHeight/2, '#fff', 12));
            }
        }
    }

    // Particles update
    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].life <= 0) { particles.splice(i, 1); i--; }
    }

    // Final Universe Zoom
    if(time > 34) {
        canvas.style.transform = `scale(${1 + (time-34)*1.8})`;
        canvas.style.transition = 'transform 0.5s linear';
        canvas.style.filter = `blur(${(time-34)*3}px)`;
    }
}
</script>
</body>
</html>
